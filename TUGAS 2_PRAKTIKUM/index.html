<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- ================= GRID ================= -->
<div class="container mt-4">
    <h2>Bootstrap Grid</h2>

    <div class="row">
        <div class="col-12 col-md-8 bg-primary text-white p-2">.col-12 .col-md-8</div>
        <div class="col-6 col-md-4 bg-secondary text-white p-2">.col-6 .col-md-4</div>
    </div>

    <div class="row mt-2">
        <div class="col-6 col-md-4 bg-success text-white p-2">.col-6 .col-md-4</div>
        <div class="col-6 col-md-4 bg-warning text-dark p-2">.col-6 .col-md-4</div>
        <div class="col-6 col-md-4 bg-danger text-white p-2">.col-6 .col-md-4</div>
    </div>

    <div class="row mt-2">
        <div class="col-6 bg-info text-white p-2">.col-6</div>
        <div class="col-6 bg-dark text-white p-2">.col-6</div>
    </div>
</div>

<!-- ================= TABLE ================= -->
<div class="container mt-5">
    <h2>Bootstrap Table</h2>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>#</th>
                <th>Nama Lengkap</th>
                <th>Asal Kota</th>
                <th>Umur</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>1</th>
                <td>Budi Rojadi</td>
                <td>Semarang</td>
                <td>35</td>
            </tr>
            <tr>
                <th>2</th>
                <td>Yulia Santi</td>
                <td>Bekasi</td>
                <td>32</td>
            </tr>
            <tr>
                <th>3</th>
                <td>Fahri Abdilah</td>
                <td>Medan</td>
                <td>28</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- ================= IMAGE ================= -->
<div class="container mt-5">
    <h2>Bootstrap Image</h2>

    <div class="d-flex gap-3">
    <img src="mod-5.jpg" class="img-thumbnail w-25">
    <img src="prak-2.jpg" class="img-fluid w-25">
</div>

<!-- ================= BUTTON ================= -->
<div class="container mt-5">
    <h4>Bootstrap Button</h4>

    <button type="button" class="btn btn-secondary">Secondary</button>
    <button type="button" class="btn btn-primary btn-lg">Primary</button>
    <button type="button" class="btn btn-success w-100 mt-2">Success</button>
    <button type="button" class="btn btn-info btn-sm mt-2">Info</button>
    <button type="button" class="btn btn-warning mt-2">Warning</button>
    <button type="button" class="btn btn-danger mt-2">Danger</button>
    <button type="button" class="btn btn-link mt-2">Link</button>
</div>

<!-- ================= FORM ================= -->
<div class="container mt-5 mb-5">
    <h3>Bootstrap Form</h3>

    <form action="#">
        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">Username:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" placeholder="Enter username">
            </div>
        </div>

        <div class="row mb-3">
            <label class="col-sm-2 col-form-label">Password:</label>
            <div class="col-sm-10">
                <input type="password" class="form-control" placeholder="Enter password">
            </div>
        </div>

        <div class="row">
            <div class="col-sm-10 offset-sm-2">
                <button type="submit" class="btn btn-success">Submit</button>
            </div>
        </div>
    </form>
</div>

</body>
</html>
